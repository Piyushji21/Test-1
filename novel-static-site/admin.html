<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - My Novel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar admin-topbar">
    <header class="topbar">
      <div class="brand-wrap">
        <span class="brand-icon">📖</span>
        <span class="brand-title">My Novel</span>
      </div>
      <a class="icon-btn" href="index.html" aria-label="Back to home">⌂</a>
    </header>

    <main class="page admin-page">
      <section class="card admin-card">
        <h1 class="admin-heading">＋ Add New Chapter</h1>

        <form id="chapterForm" class="admin-form" action="upload.php" method="post" enctype="multipart/form-data">
          <input id="adminPassword" name="adminPassword" type="password" placeholder="Admin Password" required />
          <input id="chapterNumber" name="chapterNumber" type="number" min="1" placeholder="Chapter Number" required />
          <input id="chapterTitle" name="chapterTitle" type="text" placeholder="Chapter Title" required />
          <input id="chapterSlug" name="chapterSlug" type="text" placeholder="Chapter Slug (optional)" />

          <label for="chapterFile" class="upload-btn">⤴ Upload .txt or .html file</label>
          <input id="chapterFile" name="chapterFile" type="file" accept=".html,.htm,.txt" />

          <textarea
            id="chapterText"
            name="chapterText"
            rows="12"
            placeholder="Or paste chapter content here (supports HTML)..."
          ></textarea>

          <div class="action-row admin-submit-row">
            <button id="submitChapterBtn" class="btn-primary submit-btn" type="submit">Submit Chapter</button>
          </div>

          <p id="formMessage" class="subtle admin-message"></p>
        </form>
      <div class="header-actions">
        <button id="exportBtn" class="pill-btn" type="button">Export</button>
        <label class="pill-btn file-label" for="importInput">Import</label>
        <input id="importInput" type="file" accept="application/json" hidden />
      </div>
    </header>

    <main class="page">
      <section id="lockCard" class="card admin-lock">
        <h1>Admin Access</h1>
        <input id="passwordInput" type="password" placeholder="Enter password" />
        <button id="unlockBtn" class="btn-primary" type="button">Unlock</button>
        <p id="lockMessage" class="subtle"></p>
      </section>

      <section id="adminPanel" class="card hidden">
        <h2>＋ Add New Chapter</h2>

        <input id="chapterNumber" type="number" min="1" placeholder="Chapter Number" />
        <input id="chapterTitle" type="text" placeholder="Chapter Title" />
        <input id="chapterSlug" type="text" placeholder="File slug (example: chapter-1)" />

        <label for="chapterFile" class="upload-btn">⤴ Upload .txt or .html file</label>
        <input id="chapterFile" type="file" accept=".html,.htm,.txt" hidden />

        <textarea
          id="chapterText"
          rows="12"
          placeholder="Or paste chapter content here (supports HTML)..."
        ></textarea>

        <div class="action-row">
          <button id="generateBtn" class="btn-primary" type="button">Generate Chapter</button>
          <button id="downloadBtn" class="btn-outline" type="button" disabled>
            Download .html
          </button>
        </div>

        <p class="subtle">
          Generated chapter pages should be placed in <code>novel-static-site/chapters/</code> for
          deployment.
        </p>
      </section>

      <section id="previewCard" class="card hidden">
        <h2>Generated HTML Preview</h2>
        <pre id="htmlPreview" class="preview"></pre>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
